<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ćwiczenie 1 - LocalStorage</title>
</head>
<body>

    <h2>Zapamiętaj swoje imię</h2>

    <input type="text" id="nameInput" placeholder="Wpisz imię">
    <button id="saveBtn">Zapisz</button>
    <br><br>

     <h2>Licznik odwiedzin w tej sesji</h2>
    <p>Odwiedziłeś tę stronę: <span id="counter">0</span> razy</p>

    <script>
        const input = document.getElementById("nameInput");
        const button = document.getElementById("saveBtn");

        // Wczytanie zapisanego imienia po załadowaniu strony
        window.addEventListener("DOMContentLoaded", () => {
            const savedName = localStorage.getItem("userName");
            if (savedName) {
                input.value = savedName;
            }
        });

        // Zapis do LocalStorage
        button.addEventListener("click", () => {
            localStorage.setItem("userName", input.value);
            alert("Imię zapisane!");
        });



         let counter = sessionStorage.getItem("visitCount");

        if (counter === null) {
            counter = 1;
        } else {
            counter = Number(counter) + 1;
        }

        sessionStorage.setItem("visitCount", counter);
        document.getElementById("counter").textContent = counter;
    </script>

</body>
</html>
